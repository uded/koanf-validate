# Dependabot configuration.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Go module dependencies (validator/v10 and its transitive set).
  #
  # The ignore rules below hold the line on the MSRV-tracking pins
  # documented in README's "Dependency pinning notice" section. They are
  # NOT a vote against the upstream releases — they are a vote against
  # silently raising koanf-validate's MSRV above koanf's own MSRV. When
  # knadh/koanf raises its go directive, remove these rules in the same
  # PR that bumps go.mod's go directive.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "chore(deps):"
    ignore:
      # validator/v10 v10.28+ requires Go 1.24+, v10.30+ requires Go 1.25+.
      - dependency-name: "github.com/go-playground/validator/v10"
        versions: [">=v10.28.0"]
      # golang.org/x/crypto v0.41+ requires Go 1.24+.
      - dependency-name: "golang.org/x/crypto"
        versions: [">=v0.41.0"]
      # golang.org/x/sys v0.36+ requires Go 1.24+.
      - dependency-name: "golang.org/x/sys"
        versions: [">=v0.36.0"]
      # golang.org/x/text v0.28+ requires Go 1.24+.
      - dependency-name: "golang.org/x/text"
        versions: [">=v0.28.0"]

  # GitHub Actions used in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps):"
