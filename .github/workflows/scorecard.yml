name: Scorecard supply-chain security

# Scorecard analyzes the repository against the OpenSSF Scorecard checks
# (branch protection, signed releases, dependency update tooling, SAST,
# token permissions, …). Results are uploaded to GitHub code scanning so
# the security tab shows trend data over time.

on:
  branch_protection_rule:
  schedule:
    - cron: '0 8 * * 1'  # Mondays at 08:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to code scanning.
      security-events: write
      # Required for the publish_results step.
      id-token: write
      # Required for the action to read repository contents.
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
