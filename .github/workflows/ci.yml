name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Match the Go version golangci-lint v2.12.2 was built with so
          # the linter's "targeted Go version" detection doesn't trip.
          go-version: '1.26'
      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt found unformatted files:"
            gofmt -l .
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin a specific version so CI matches the local pre-commit hook
          # bit-for-bit. "latest" resolves to whatever the action has
          # cached, not whatever's newest on GitHub releases.
          version: v2.12.2

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.23', '1.24', '1.25', '1.26']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Upload coverage
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.txt
          fail_ci_if_error: false

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Run govulncheck against the module's declared MSRV so the scan
          # answers "are there known vulns at the version we promise to
          # support?" rather than at whatever Go the GitHub runners default
          # to today. Reads from the `go` (or `toolchain`) directive in go.mod.
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
