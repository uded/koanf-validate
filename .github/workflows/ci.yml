name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Match the Go version golangci-lint v2.12.2 was built with so
          # the linter's "targeted Go version" detection doesn't trip.
          go-version: '1.26'
      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt found unformatted files:"
            gofmt -l .
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin a specific version so CI matches the local pre-commit hook
          # bit-for-bit. "latest" resolves to whatever the action has
          # cached, not whatever's newest on GitHub releases.
          version: v2.12.2

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.23', '1.24', '1.25', '1.26']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: go test -race ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Single source of truth — coverage tracks the module's MSRV
          # automatically, so bumping go.mod retargets the upload with
          # no workflow edit and no magic matrix-entry string to keep
          # in sync.
          go-version-file: go.mod
      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.txt
          # Fail loudly if the upload itself fails so a codecov outage
          # cannot silently bypass the threshold gates declared in
          # codecov.yml. The gates are the actual quality signal — losing
          # the upload means losing the gate.
          fail_ci_if_error: true

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Run benchmarks under MSRV — the perf numbers downstream
          # consumers actually see at the floor of the supported range.
          go-version-file: go.mod
      - name: Run benchmarks
        # -count=6 amortises GC/runtime noise; -benchtime=2s gives each
        # bench enough iterations for stable ns/op. The .txt extension
        # makes the artifact directly consumable by `benchstat`.
        run: go test -bench=. -benchmem -count=6 -benchtime=2s -run=^$ ./... | tee bench.txt
      - name: Upload bench output
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ github.sha }}
          path: bench.txt
          retention-days: 90

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # govulncheck@latest requires a recent Go to install (v1.3.0
          # needs >= 1.25), but its analysis reads the module's own `go`
          # directive — running the binary on stable Go does not bias
          # the MSRV claim. Pinning to MSRV here only blocks the install.
          go-version: 'stable'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
