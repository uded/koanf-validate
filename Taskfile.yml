# Taskfile for koanf-validate (go-task — https://taskfile.dev).
#
# Quick reference:
#   task                 # default — runs `task test`
#   task fmt             # gofmt
#   task vet             # go vet
#   task test            # race-enabled unit tests
#   task cover           # race tests + HTML coverage at coverage.html
#   task bench           # benchmarks with allocations reported
#   task lint            # vet + gofmt check + golangci-lint
#   task vuln            # govulncheck (no caching — pulls latest tool)
#   task tidy            # go mod tidy
#   task ci              # full local CI: lint → test → vuln
#
# The `ci` target mirrors .github/workflows/ci.yml's job list so a local
# `task ci` answers "would this push pass?" without waiting on GitHub.
# Run it before opening a PR; CONTRIBUTING.md treats it as a soft gate.

version: '3'

tasks:
  default:
    cmds:
      - task: test

  fmt:
    desc: Format Go source
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  cover:
    desc: Run tests with coverage report
    cmds:
      - go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - go tool cover -html=coverage.txt -o coverage.html

  bench:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem ./...

  lint:
    desc: Lint (vet + gofmt check + golangci-lint)
    cmds:
      - go vet ./...
      - 'test -z "$(gofmt -l .)"'
      - golangci-lint run

  vuln:
    desc: Run govulncheck against the module
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  tidy:
    desc: Tidy module dependencies
    cmds:
      - go mod tidy

  ci:
    desc: Full CI pipeline (matches .github/workflows/ci.yml)
    cmds:
      - task: lint
      - task: test
      - task: vuln
